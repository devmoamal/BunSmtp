version: '3.8'

services:
  smtp-relay:
    build: .
    container_name: bun-smtp-relay
    restart: always
    ports:
      - "587:587"
      - "25:25"
    volumes:
      - ./data:/usr/src/app/data
      - ./certs:/certs
    environment:
      - NODE_ENV=production
      - SMTP_PORT=${SMTP_PORT:-25}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_DOMAIN=${SMTP_DOMAIN:-localhost}
      - SMTP_USERS_JSON=${SMTP_USERS_JSON:-[]}
      - DEBUG=${DEBUG:-false}
      - TLS_CERT=/certs/fullchain.pem
      - TLS_KEY=/certs/privkey.pem
