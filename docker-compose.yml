version: "3.8"
services:
  smtp-relay:
    build: .
    container_name: bun-smtp-relay
    ports:
      - "${SMTP_PORT:-25}:25"
    environment:
      - SMTP_PORT=${SMTP_PORT:-25}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_DOMAIN=${SMTP_DOMAIN:-localhost}
      - DEBUG=${DEBUG:-false}
    restart: always
